<html lang="en">

  <style>
    :root {

    @media screen and (-webkit-min-device-pixel-ratio:0) {
      @font-face {
        font-family: "CurrysSans Headline";
        src: url("https://currys-ssl.cdn.dixons.com/css/themes/email/Assets/brightWorld/css/curryssansheadline.woff") format("woff");
      }
      @font-face {
        font-family: "CurrysSans Regular";
        src: url("https://currys-ssl.cdn.dixons.com/css/themes/email/Assets/brightWorld/css/curryssansregular.woff") format("woff");

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.45 var(--sans); overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 22px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 28px; }
    .brand h1 { margin: 0; font: 700 22px/1 var(--headline); }
    .sub { color: var(--muted); font-size: 13px; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .layout { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 76px); }
    .sidebar { background: var(--nav); border-right: 1px solid var(--border); padding: 18px 18px 64px; overflow: auto; scroll-padding-bottom: 64px; }
    .main { padding: 22px; overflow: auto; scroll-behavior: auto; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); }
    .search { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; }
    .group { margin-top: 16px; }
    .group h2 { margin: 0 0 10px; font-size: 14px; text-transform: uppercase; color: var(--muted); letter-spacing: .03em; }
    .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .nav-item.active { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .nav-item .label { display: block; font-weight: 700; }
    .nav-item .meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .detail { padding: 18px; }
    .meta-grid { display: grid; grid-template-columns: 190px 1fr; gap: 8px 14px; margin-bottom: 18px; }
    .meta-grid dt { color: var(--muted); font-weight: 700; }
    .meta-grid dd { margin: 0; word-break: break-word; }
    .preview-tabs { display: flex; gap: 10px; margin-bottom: 14px; }
    .preview-tab {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .preview-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .preview { background: var(--panel-soft); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
    .preview img { width: 100%; max-width: 900px; height: auto; background: #fff; border: 1px solid var(--border); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .actions.actions-quad { flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: #fff; color: var(--text); text-decoration: none; font-weight: 700; }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .empty { padding: 24px; text-align: center; color: var(--muted); }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      .meta-grid { grid-template-columns: 1fr; }
      .actions.actions-quad { flex-wrap: wrap; }
    }
  </style>
</head>
