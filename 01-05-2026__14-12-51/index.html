<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Currys Screenshot Catalogue</title>
  <link rel="icon" href="./assets/currys-logo.svg">
  <style>
    :root {
      --bg: #f1f2f4;
      --panel: #ffffff;
      --panel-soft: #f8f9fb;
      --text: #1a2230;
      --muted: #556070;
      --border: #d7dce4;
      --accent: #1f5eff;
      --nav: #eef1f5;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --sans: "CurrysSans Regular", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --headline: "CurrysSans Headline", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    @media screen and (-webkit-min-device-pixel-ratio:0) {
      @font-face {
        font-family: "CurrysSans Headline";
        src: url("https://currys-ssl.cdn.dixons.com/css/themes/email/Assets/brightWorld/css/curryssansheadline.woff") format("woff");
      }
      @font-face {
        font-family: "CurrysSans Regular";
        src: url("https://currys-ssl.cdn.dixons.com/css/themes/email/Assets/brightWorld/css/curryssansregular.woff") format("woff");
      }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.45 var(--sans); overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 22px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 28px; }
    .brand h1 { margin: 0; font: 700 22px/1 var(--headline); }
    .sub { color: var(--muted); font-size: 13px; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .layout { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 76px); }
    .sidebar { background: var(--nav); border-right: 1px solid var(--border); padding: 18px 18px 64px; overflow: auto; scroll-padding-bottom: 64px; }
    .main { padding: 22px; overflow: auto; scroll-behavior: auto; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); }
    .search { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; }
    .group { margin-top: 16px; }
    .group h2 { margin: 0 0 10px; font-size: 14px; text-transform: uppercase; color: var(--muted); letter-spacing: .03em; }
    .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .nav-item.active { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .nav-item .label { display: block; font-weight: 700; }
    .nav-item .meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .detail { padding: 18px; }
    .meta-grid { display: grid; grid-template-columns: 190px 1fr; gap: 8px 14px; margin-bottom: 18px; }
    .meta-grid dt { color: var(--muted); font-weight: 700; }
    .meta-grid dd { margin: 0; word-break: break-word; }
    .preview-tabs { display: flex; gap: 10px; margin-bottom: 14px; }
    .preview-tab {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 9px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .preview-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .preview { background: var(--panel-soft); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
    .preview img { width: 100%; max-width: 900px; height: auto; background: #fff; border: 1px solid var(--border); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .actions.actions-quad { flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: #fff; color: var(--text); text-decoration: none; font-weight: 700; }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .empty { padding: 24px; text-align: center; color: var(--muted); }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      .meta-grid { grid-template-columns: 1fr; }
      .actions.actions-quad { flex-wrap: wrap; }
    }
  </style>
</head>

    </aside>
    <main class="main">
      <section id="detail" class="panel detail">
        <div class="empty">Select a screenshot from the left.</div>
      </section>
    </main>

    const state = { items: [], filtered: [], selectedIndex: -1, activePreview: "main" };
    const nav = document.getElementById("nav");
    const detail = document.getElementById("detail");
    const search = document.getElementById("search");
    const mainPane = document.querySelector(".main");

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>\"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
    }

    function renderNav() {
      const term = search.value.trim().toLowerCase();
      state.filtered = state.items.filter(item => {
        const haystack = [
          item["Delivery code (del)"],
          item["Template name"],
          item["Label"],
          item["Full name (del/Folder)"]
        ].join(" ").toLowerCase();
        return haystack.includes(term);
      });
      nav.innerHTML = "";
      if (!state.filtered.length) {
        nav.innerHTML = '<div class="empty panel" style="padding:16px">No items match the current filter.</div>';
        detail.innerHTML = '<div class="empty">No screenshot selected.</div>';
        return;
      }
      let currentGroup = null;
      state.filtered.forEach((item, index) => {
        if (item["Delivery code (del)"] !== currentGroup) {
          currentGroup = item["Delivery code (del)"];
          const group = document.createElement("div");
          group.className = "group";
          group.innerHTML = "<h2>" + escapeHtml(currentGroup) + "</h2>";
          nav.appendChild(group);
        }
        const button = document.createElement("button");
        button.className = "nav-item" + (index === state.selectedIndex ? " active" : "");
        button.innerHTML = '<span class="label">' + escapeHtml(item["Template name"]) + '</span>' +
          '<span class="meta" style="word-wrap: break-word; overflow-wrap: anywhere; word-break: break-word; white-space: normal;">' + escapeHtml(item["Label"]) + '</span>';
        button.addEventListener("click", () => selectItem(index));
        nav.appendChild(button);
      });
      if (state.selectedIndex < 0 || state.selectedIndex >= state.filtered.length) {
        selectItem(0);
      }
    }

    function selectItem(index) {
      state.selectedIndex = index;
      state.activePreview = "main";
      const item = state.filtered[index];
      if (!item) {
        detail.innerHTML = '<div class="empty">No screenshot selected.</div>';
        return;
      }
      const imageLink = item.output_file;
      const dvImageLink = item.dv_output_file;
      const mirrorLink = item.mirrorUrl;
      const htmlLink = item.html_output_file;
      const miLink = item.mi_campaign_url || "";
      detail.innerHTML = `
        <div class="actions actions-quad">
          <a class="btn primary" href="${escapeHtml(imageLink)}" target="_blank" rel="noopener">Open Screenshot</a>
          <a class="btn" href="${escapeHtml(mirrorLink)}" target="_blank" rel="noopener">Open Mirror Link</a>
          <a class="btn" href="${escapeHtml(htmlLink)}" target="_blank" rel="noopener">Open saved HTML</a>
          ${miLink ? `<a class="btn" href="${escapeHtml(miLink)}" target="_blank" rel="noopener">Open MI Link</a>` : ""}
          <a class="btn primary" href="${escapeHtml(dvImageLink)}" target="_blank" rel="noopener">Open DV Screenshot</a>
        </div>
        <dl class="meta-grid">
          <dt>(del/Folder)</dt><dd>${escapeHtml(item["Delivery code (del)"])}</dd>
          <dt>Template name</dt><dd>${escapeHtml(item["Template name"])}</dd>
          <dt>Label</dt><dd>${escapeHtml(item["Label"])}</dd>
          <dt>Full name (del/Folder)</dt><dd>${escapeHtml(item["Full name (del/Folder)"])}</dd>
          <dt>Status</dt><dd>${escapeHtml(item.capture_status)}</dd>
        </dl>
        <div class="preview-tabs">
          <button type="button" class="preview-tab active" data-preview-tab="main">Main Render</button>
          <button type="button" class="preview-tab" data-preview-tab="dv">DV Render</button>
        </div>
        <div class="preview">
          <img id="preview_image" src="${escapeHtml(imageLink)}" alt="${escapeHtml(item["Template name"])}">
        </div>`;
      const previewImage = detail.querySelector("#preview_image");
      const tabs = detail.querySelectorAll("[data-preview-tab]");
      tabs.forEach(tab => {
        tab.addEventListener("click", () => {
          state.activePreview = tab.getAttribute("data-preview-tab");
          const isDv = state.activePreview === "dv";
          previewImage.src = isDv ? dvImageLink : imageLink;
          previewImage.alt = isDv
            ? item["Template name"] + " DV Render"
            : item["Template name"];
          tabs.forEach(node => {
            node.classList.toggle("active", node === tab);
          });
        });
      });
      if (mainPane) {
        mainPane.scrollTo({ top: 0, left: 0, behavior: "auto" });
      }
      const activeNavItem = nav.querySelector(".nav-item.active");
      if (activeNavItem) {
        activeNavItem.scrollIntoView({ block: "center", inline: "nearest" });
      }
      renderNav();
    }

    search.addEventListener("input", () => {
      state.selectedIndex = -1;
      renderNav();
    });

    state.items = (EMBEDDED_ITEMS || []).filter(item => item.capture_status === "success" && item.dv_capture_status === "success");
    renderNav();
  </script>
