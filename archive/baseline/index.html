<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Currys Frozen Outputs</title>
  <style>
    :root {
      --bg: #eef2f8;
      --panel: #ffffff;
      --text: #1e2738;
      --muted: #5f6f86;
      --border: #d7dfea;
      --accent: #2563f6;
    }
    body {
      margin: 0;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 52px 20px 84px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -0.03em;
    }
    .intro {
      margin-top: 12px;
      color: #283447;
      font-size: 15px;
    }
    .run-card {
      margin-top: 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px 18px 20px;
    }
    .run-card h2 {
      margin: 0 0 18px;
      font-size: 24px;
      letter-spacing: -0.03em;
    }
    .path {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--muted);
      font-size: 14px;
      word-break: break-word;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 15px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }
    a.button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Currys Frozen Outputs</h1>
    <p class="intro">GitHub Pages staging area for two preserved export folders copied verbatim from <code>exports/</code>.</p>
    <section class="run-card">
      <h2>01-05-2026__13-47-45</h2>
      <div class="path">github_pages/01-05-2026__13-47-45/</div>
      <div class="actions">
        <a class="button primary" href="./01-05-2026__13-47-45/index.html">Open index.html</a>
        <a class="button" href="./01-05-2026__13-47-45/board.html">Open board.html</a>
      </div>
    </section>
    <section class="run-card">
      <h2>01-05-2026__14-12-51</h2>
      <div class="path">github_pages/01-05-2026__14-12-51/</div>
      <div class="actions">
        <a class="button primary" href="./01-05-2026__14-12-51/index.html">Open index.html</a>
        <a class="button" href="./01-05-2026__14-12-51/board.html">Open board.html</a>
      </div>
    </section>
  </main>
</body>
</html>
